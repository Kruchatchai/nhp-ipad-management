<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NHP iPad Management System — โรงเรียนหนองหงส์พิทยาคม</title>
  <link rel="icon" href="assets/logo.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    /* โหลดไฟล์แอปแบบ cache-busting (?v=เวลา) เพื่อให้ได้โค้ดล่าสุดเสมอหลัง deploy
       — ไม่ต้องล้างแคช/Ctrl+F5 อีก */
    (function () {
      var v = Date.now();
      var classic = ["data.js", "config.js", "supabase.js"];
      var babel = ["icons.jsx", "components.jsx", "store.jsx", "pages1.jsx", "pages2.jsx",
        "pages3.jsx", "pages4.jsx", "pages5.jsx", "pages6.jsx", "pages7.jsx", "app.jsx"];
      function loadClassic(i, done) {
        if (i >= classic.length) return done();
        var s = document.createElement("script");
        s.src = classic[i] + "?v=" + v;
        s.onload = function () { loadClassic(i + 1, done); };
        s.onerror = function () { loadClassic(i + 1, done); };
        document.body.appendChild(s);
      }
      function runBabel() {
        if (!window.Babel) { return setTimeout(runBabel, 50); }  // รอ Babel โหลดเสร็จ
        babel.forEach(function (f) {
          var s = document.createElement("script");
          s.type = "text/babel"; s.setAttribute("data-presets", "react");
          s.src = f + "?v=" + v;
          document.body.appendChild(s);
        });
        window.Babel.transformScriptTags();  // ดึง+คอมไพล์ตามลำดับเอกสาร
      }
      loadClassic(0, runBabel);
    })();
  </script>
</body>
</html>
